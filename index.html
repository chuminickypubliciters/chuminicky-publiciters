<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chuminicky Publiciters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B0F19;--ink-2:#11172A;--panel:#161D33;--line:#272F4A;
    --violet:#7C5CFF;--violet-dim:#5A3FE0;--lime:#C8FF4D;--white:#F5F3EE;
    --slate:#8A8FA3;--coral:#FF6B5E;
    --font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--ink);color:var(--white);font-family:var(--font-body);scroll-behavior:smooth;}
  ::selection{background:var(--violet);color:var(--white);}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;}
  :focus-visible{outline:2px solid var(--lime);outline-offset:2px;}
  .app{min-height:100vh;display:flex;flex-direction:column;}

  header.nav{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:18px 32px;background:rgba(11,15,25,0.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
  .logo{display:flex;align-items:baseline;gap:8px;cursor:pointer;}
  .logo .mark{width:10px;height:10px;background:var(--lime);display:inline-block;border-radius:2px;transform:rotate(45deg);transition:.15s;cursor:pointer;}
  .logo .mark:active{transform:rotate(45deg) scale(0.8);}
  .logo .word{font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:-0.02em;}
  .logo .word span{color:var(--lime);}
  nav.links{display:flex;gap:28px;align-items:center;}
  nav.links button.navbtn{background:none;border:none;color:var(--slate);font-size:14px;font-weight:500;padding:6px 0;border-bottom:2px solid transparent;transition:.15s;}
  nav.links button.navbtn:hover,nav.links button.navbtn.active{color:var(--white);border-color:var(--lime);}
  .nav-actions{display:flex;gap:10px;align-items:center;}
  .pill{font-family:var(--font-mono);font-size:11px;color:var(--slate);background:var(--panel);border:1px solid var(--line);padding:5px 10px;border-radius:20px;}
  .lang-btn{font-family:var(--font-mono);font-size:11px;padding:5px 10px;border-radius:20px;border:1px solid var(--line);background:var(--panel);color:var(--lime);cursor:pointer;font-weight:600;transition:.15s;}
  .lang-btn:hover{border-color:var(--lime);}
  .btn{font-family:var(--font-body);font-weight:600;font-size:13.5px;padding:10px 18px;border-radius:8px;border:1px solid transparent;transition:.15s;}
  .btn-primary{background:var(--lime);color:var(--ink);}
  .btn-primary:hover{background:#d8ff7a;}
  .btn-ghost{background:transparent;color:var(--white);border-color:var(--line);}
  .btn-ghost:hover{border-color:var(--violet);color:var(--violet);}
  .btn-violet{background:var(--violet);color:var(--white);}
  .btn-violet:hover{background:var(--violet-dim);}
  .btn-sm{padding:7px 12px;font-size:12.5px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  main{flex:1;}

  .burger{display:none;background:none;border:1px solid var(--line);color:var(--white);border-radius:8px;padding:9px 11px;font-size:16px;line-height:1;}
  .mobile-menu{display:none;flex-direction:column;gap:2px;padding:10px 16px 16px;border-bottom:1px solid var(--line);background:var(--ink-2);}
  .mobile-menu.open{display:flex;}
  .mobile-menu button{background:none;border:none;color:var(--slate);text-align:left;padding:10px 4px;font-size:14px;font-weight:500;border-bottom:1px solid var(--line);}
  .mobile-menu button:last-child{border-bottom:none;}
  .mobile-menu button.active{color:var(--lime);}

  .ticker-wrap{border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--ink-2);overflow:hidden;white-space:nowrap;position:relative;}
  .ticker-wrap::before,.ticker-wrap::after{content:"";position:absolute;top:0;bottom:0;width:60px;z-index:2;pointer-events:none;}
  .ticker-wrap::before{left:0;background:linear-gradient(90deg,var(--ink-2),transparent);}
  .ticker-wrap::after{right:0;background:linear-gradient(270deg,var(--ink-2),transparent);}
  .ticker{display:inline-flex;animation:scroll 38s linear infinite;padding:12px 0;}
  .ticker:hover{animation-play-state:paused;}
  @keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
  .tick-item{font-family:var(--font-mono);font-size:12.5px;color:var(--slate);padding:0 28px;display:inline-flex;gap:8px;align-items:center;}
  .tick-item b{color:var(--lime);font-weight:600;}
  .tick-item .dot{width:5px;height:5px;border-radius:50%;background:var(--violet);}

  .hero{padding:96px 32px 64px;max-width:1080px;margin:0 auto;text-align:left;}
  .eyebrow{font-family:var(--font-mono);font-size:12px;color:var(--violet);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:10px;}
  .eyebrow::before{content:"";width:24px;height:1px;background:var(--violet);}
  h1.hero-title{font-family:var(--font-display);font-weight:700;font-size:clamp(40px,6vw,72px);line-height:1.02;letter-spacing:-0.03em;max-width:880px;}
  h1.hero-title .accent{color:var(--lime);}
  p.hero-sub{font-size:17px;color:var(--slate);max-width:560px;margin-top:24px;line-height:1.6;}
  .hero-cta{display:flex;gap:14px;margin-top:36px;flex-wrap:wrap;}
  .hero-stats{display:flex;gap:48px;margin-top:72px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:28px;}
  .stat .num{font-family:var(--font-display);font-size:30px;font-weight:700;color:var(--white);}
  .stat .lbl{font-family:var(--font-mono);font-size:11.5px;color:var(--slate);text-transform:uppercase;letter-spacing:.05em;margin-top:4px;}

  .section{padding:80px 32px;max-width:1080px;margin:0 auto;}
  .section-head{margin-bottom:48px;}
  .section-head .eyebrow{margin-bottom:14px;}
  h2.section-title{font-family:var(--font-display);font-size:clamp(28px,4vw,38px);font-weight:700;letter-spacing:-0.02em;}
  .flow{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .flow-step{background:var(--ink-2);padding:28px 22px;position:relative;}
  .flow-step .fnum{font-family:var(--font-mono);font-size:11px;color:var(--violet);margin-bottom:14px;}
  .flow-step h3{font-family:var(--font-display);font-size:17px;font-weight:600;margin-bottom:10px;}
  .flow-step p{font-size:13.5px;color:var(--slate);line-height:1.55;}
  @media(max-width:900px){.flow{grid-template-columns:1fr 1fr;}}
  @media(max-width:600px){.flow{grid-template-columns:1fr;}}

  .auth-wrap{max-width:440px;margin:64px auto;padding:0 24px;}
  .auth-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:36px;}
  .auth-tabs{display:flex;gap:0;margin-bottom:28px;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .auth-tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;background:transparent;border:none;color:var(--slate);}
  .auth-tab.active{background:var(--violet);color:var(--white);}
  h2.auth-title{font-family:var(--font-display);font-size:24px;margin-bottom:6px;}
  p.auth-sub{font-size:13.5px;color:var(--slate);margin-bottom:26px;}
  .field{margin-bottom:18px;}
  .field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:7px;color:var(--white);}
  .field input,.field select,.field textarea{width:100%;background:var(--ink-2);border:1px solid var(--line);color:var(--white);padding:11px 13px;border-radius:8px;font-size:13.5px;font-family:var(--font-body);}
  .field textarea{resize:vertical;min-height:80px;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--violet);}
  .auth-error{background:rgba(255,107,94,0.1);border:1px solid var(--coral);color:var(--coral);font-size:12.5px;padding:10px 12px;border-radius:7px;margin-bottom:16px;}
  .auth-foot{margin-top:22px;text-align:center;font-size:12.5px;color:var(--slate);}
  .auth-foot button{background:none;border:none;color:var(--lime);font-weight:600;font-size:12.5px;}
  .net-row{display:grid;grid-template-columns:110px 1fr 90px;gap:8px;margin-bottom:8px;}
  .net-row input,.net-row select{padding:9px 10px;font-size:12.5px;}
  .add-net{background:none;border:1px dashed var(--line);color:var(--slate);width:100%;padding:8px;border-radius:7px;font-size:12px;margin-top:4px;}
  .add-net:hover{border-color:var(--violet);color:var(--violet);}

  .filters{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap;}
  .chip{font-family:var(--font-mono);font-size:11.5px;padding:7px 13px;border:1px solid var(--line);border-radius:20px;color:var(--slate);background:var(--panel);cursor:pointer;}
  .chip.on{border-color:var(--lime);color:var(--lime);}
  .camp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
  .camp-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px;display:flex;flex-direction:column;gap:14px;transition:.15s;}
  .camp-card:hover{border-color:var(--violet);}
  .camp-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .camp-title{font-family:var(--font-display);font-size:17px;font-weight:600;line-height:1.25;}
  .badge{font-family:var(--font-mono);font-size:10.5px;padding:4px 9px;border-radius:20px;white-space:nowrap;}
  .badge.activa{background:rgba(200,255,77,0.12);color:var(--lime);}
  .badge.cerrada{background:rgba(138,143,163,0.15);color:var(--slate);}
  .camp-desc{font-size:13px;color:var(--slate);line-height:1.55;flex:1;}
  .camp-meta{display:flex;flex-wrap:wrap;gap:8px;}
  .meta-tag{font-family:var(--font-mono);font-size:10.5px;color:var(--white);background:var(--ink-2);border:1px solid var(--line);padding:4px 9px;border-radius:6px;}
  .camp-pay{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding-top:14px;}
  .camp-links{display:flex;flex-wrap:wrap;gap:8px;}
  .camp-link{font-family:var(--font-mono);font-size:11px;color:var(--violet);border:1px solid var(--line);padding:5px 10px;border-radius:6px;transition:.15s;text-decoration:none;display:inline-block;}
  .camp-link:hover{border-color:var(--violet);background:rgba(124,92,255,0.08);}
  .camp-deliverables,.camp-pago-info{background:var(--ink-2);border:1px solid var(--line);border-radius:8px;padding:12px 14px;font-size:12.5px;}
  .cdl-title{font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;color:var(--lime);letter-spacing:.04em;margin-bottom:8px;}
  .cdl-text{color:var(--slate);line-height:1.65;}
  .pay-amt{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--lime);}
  .pay-deadline{font-size:11px;color:var(--slate);font-family:var(--font-mono);}

  .modal-bg{position:fixed;inset:0;background:rgba(11,15,25,0.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;padding:32px;}
  .modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
  .modal-close{background:none;border:none;color:var(--slate);font-size:20px;line-height:1;}
  .modal-close:hover{color:var(--white);}

  .dash{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 64px);}
  .sidebar{border-right:1px solid var(--line);padding:28px 18px;background:var(--ink-2);}
  .side-label{font-family:var(--font-mono);font-size:10.5px;color:var(--slate);text-transform:uppercase;letter-spacing:.06em;padding:0 10px;margin:18px 0 8px;}
  .side-btn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;color:var(--slate);padding:10px 10px;border-radius:8px;font-size:13.5px;font-weight:500;margin-bottom:2px;}
  .side-btn:hover{background:var(--panel);color:var(--white);}
  .side-btn.active{background:rgba(124,92,255,0.15);color:var(--violet);}
  .side-count{margin-left:auto;font-family:var(--font-mono);font-size:10.5px;background:var(--line);padding:2px 7px;border-radius:10px;}
  .dash-content{padding:32px 36px;overflow-x:hidden;}
  .dash-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:14px;}
  .dash-head h2{font-family:var(--font-display);font-size:26px;}
  table.tbl{width:100%;border-collapse:collapse;}
  table.tbl th{text-align:left;font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;color:var(--slate);padding:10px 14px;border-bottom:1px solid var(--line);letter-spacing:.04em;}
  table.tbl td{padding:14px;border-bottom:1px solid var(--line);font-size:13.5px;}
  table.tbl tr:hover td{background:rgba(124,92,255,0.04);}
  .status-pill{font-family:var(--font-mono);font-size:10.5px;padding:4px 10px;border-radius:20px;display:inline-block;}
  .status-pendiente{background:rgba(255,193,7,0.12);color:#FFC107;}
  .status-aprobada{background:rgba(200,255,77,0.12);color:var(--lime);}
  .status-rechazada{background:rgba(255,107,94,0.12);color:var(--coral);}
  .status-completada{background:rgba(124,92,255,0.15);color:var(--violet);}
  .empty{text-align:center;padding:60px 20px;color:var(--slate);}
  .empty .eicon{font-size:32px;margin-bottom:14px;}
  .empty h3{font-family:var(--font-display);color:var(--white);margin-bottom:8px;font-size:16px;}
  .empty p{font-size:13px;max-width:320px;margin:0 auto;}

  .chat-layout{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 64px - 56px);}
  .chat-list{border-right:1px solid var(--line);overflow-y:auto;background:var(--ink-2);}
  .chat-list-item{padding:16px 18px;border-bottom:1px solid var(--line);cursor:pointer;}
  .chat-list-item:hover,.chat-list-item.active{background:var(--panel);}
  .cli-top{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:4px;}
  .cli-camp{font-size:11.5px;color:var(--violet);font-family:var(--font-mono);margin-bottom:4px;}
  .cli-preview{font-size:12px;color:var(--slate);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .chat-window{display:flex;flex-direction:column;}
  .chat-header{padding:18px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
  .chat-header h3{font-family:var(--font-display);font-size:16px;}
  .chat-header .sub{font-size:11.5px;color:var(--slate);font-family:var(--font-mono);margin-top:2px;}
  .chat-msgs{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px;}
  .msg{max-width:62%;padding:11px 15px;border-radius:12px;font-size:13.5px;line-height:1.5;}
  .msg.in{align-self:flex-start;background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:3px;}
  .msg.out{align-self:flex-end;background:var(--violet);color:var(--white);border-bottom-right-radius:3px;}
  .msg .mt{font-family:var(--font-mono);font-size:10px;opacity:.6;margin-top:6px;display:block;}
  .chat-input{display:flex;gap:10px;padding:18px 24px;border-top:1px solid var(--line);}
  .chat-input input{flex:1;background:var(--ink-2);border:1px solid var(--line);color:var(--white);padding:12px 14px;border-radius:9px;font-size:13.5px;}
  .chat-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--slate);font-size:13.5px;flex-direction:column;gap:10px;}

  footer{border-top:1px solid var(--line);padding:28px 32px;text-align:center;font-size:12px;color:var(--slate);font-family:var(--font-mono);}

  @media(max-width:860px){
    .dash{grid-template-columns:1fr;}
    .sidebar{display:flex;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line);padding:14px;}
    .side-section{display:flex;gap:6px;}
    .side-label{display:none;}
    .chat-layout{grid-template-columns:1fr;}
    .chat-list{display:none;}
    nav.links{display:none;}
    .burger{display:inline-block;}
    .hero-stats{gap:28px;}
  }
</style>
</head>

function el(tag,attrs,children){

function Chat(){
  if(!state.currentUser) return Auth();
  const p=el('div',{class:'app'});p.appendChild(Nav());
  const isA=state.currentUser.rol==='admin';
  const myP=isA?state.postulaciones:state.postulaciones.filter(pp=>pp.influencer_id===state.currentUser.id);
  const ly=el('div',{class:'chat-layout'}),cl=el('div',{class:'chat-list'});
  if(!myP.length) cl.appendChild(el('div',{style:'padding:24px;color:var(--slate);font-size:12.5px;'},[t('chat_no_convos')]));
  myP.forEach(pp=>{
    const camp=state.campañas.find(c=>c.id===pp.campaña_id),inf=state.users.find(u=>u.id===pp.influencer_id);
    const msgs=state.mensajes.filter(mm=>mm.postulacion_id===pp.id),last=msgs[msgs.length-1];
    cl.appendChild(el('div',{class:'chat-list-item'+(state.activeChatId===pp.id?' active':''),onclick:()=>go('chat',{activeChatId:pp.id})},[
      el('div',{class:'cli-top'},[isA?(inf?.perfil?.alias||inf?.nombre_completo):t('chat_team')]),
      el('div',{class:'cli-camp'},[camp?lt(camp.titulo):'']),
      el('div',{class:'cli-preview'},[last?last.texto:t('chat_no_msgs')])
    ]));
  });
  ly.appendChild(cl);
  const wn=el('div',{class:'chat-window'}),ap=state.postulaciones.find(pp=>pp.id===state.activeChatId)||(myP.length===1?myP[0]:null);
  if(!ap){
    wn.appendChild(el('div',{class:'chat-empty'},[el('div',{style:'font-size:28px;'},['💬']),el('div',{},[t('chat_select')])]));
  } else {
    const camp=state.campañas.find(c=>c.id===ap.campaña_id),inf=state.users.find(u=>u.id===ap.influencer_id);
    wn.appendChild(el('div',{class:'chat-header'},[el('div',{},[el('h3',{},[isA?(inf?.perfil?.alias||inf?.nombre_completo):t('chat_team')+' · DiamondWall']),el('div',{class:'sub'},[camp?lt(camp.titulo):''])]),el('span',{class:'status-pill status-'+ap.estado},[statusT(ap.estado)])]));
    const mw=el('div',{class:'chat-msgs',id:'chat-msgs-scroll'});
    state.mensajes.filter(mm=>mm.postulacion_id===ap.id).forEach(mm=>{
      const mine=mm.de===state.currentUser.id;
      mw.appendChild(el('div',{class:'msg '+(mine?'out':'in')},[mm.texto,el('span',{class:'mt'},[mm.hora])]));
    });
    wn.appendChild(mw);
    const ir=el('div',{class:'chat-input'}),inp=el('input',{type:'text',placeholder:t('chat_placeholder')});
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')sb.click();});
    const sb=el('button',{class:'btn btn-primary',onclick:()=>{
      const tx=inp.value.trim();if(!tx)return;
      state.mensajes.push({id:uid('m'),postulacion_id:ap.id,de:state.currentUser.id,texto:tx,hora:'ahora'});
      go('chat',{activeChatId:ap.id});
      setTimeout(()=>{const sc=document.getElementById('chat-msgs-scroll');if(sc)sc.scrollTop=sc.scrollHeight;},0);
    }},[t('chat_send')]);
    ir.appendChild(inp);ir.appendChild(sb);wn.appendChild(ir);
  }
  ly.appendChild(wn);p.appendChild(ly);
  setTimeout(()=>{const sc=document.getElementById('chat-msgs-scroll');if(sc)sc.scrollTop=sc.scrollHeight;},0);
  return p;
}
